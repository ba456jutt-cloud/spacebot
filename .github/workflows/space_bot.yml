name: Fugu Space Bot Automation

on:
  schedule:
    # 5:00 AM Pakistan time (00:00 UTC)
    - cron: '0 0 * * *'
    # 8:00 PM Pakistan time (15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  run-space-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies (ImageMagick & FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ffmpeg
          # Fix ImageMagick security policy for MoviePy text rendering
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/g' /etc/ImageMagick-6/policy.xml
          sudo sed -i '/pattern="@\*/d' /etc/ImageMagick-6/policy.xml

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Prepare Authentication Files
        env:
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
        run: |
          echo "$CLIENT_SECRETS_JSON" > client_secrets.json
          echo "$TOKEN_JSON" > token.json
          mkdir -p output
          mkdir -p assets

      - name: Run Fugu Space Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Upload Output Video Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rendered-space-video-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 7
